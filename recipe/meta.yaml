{% set name = "brent-search" %}
{% set version = "2.0.2" %}
{% set sha256 = "a2725cd016f8f9cc809e5fddb714b8eb600b3410f8a221f18438c009e4b91a2d" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python
    - setuptools
    - pytest-runner
  run:
    - numpy
    - python
    - pytest >=3

test:
  requires:
    - pytest >=3
  imports:
    - brent_search
  commands:
    - python -c "import sys; import brent_search; sys.exit(brent_search.test())"

about:
  home: https://github.com/limix/brent-search
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: "Brent's method for univariate function optimization."
  doc_url: https://brent-search.readthedocs.io
  dev_url: https://github.com/limix/brent-search

extra:
  recipe-maintainers:
    - Horta
